<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Johny Vino — Interaction Library</title>
  <meta name="description" content="UI interactions, design concepts and animations by Johny Vino — built over 2 years across mobile, web and product design.">
  <meta name="author" content="Johny Vino">
  <link rel="canonical" href="https://interactions.johnyvino.com/">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://interactions.johnyvino.com/">
  <meta property="og:title" content="Johny Vino — Interaction Library">
  <meta property="og:description" content="UI interactions, design concepts and animations by Johny Vino.">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Johny Vino — Interaction Library">
  <meta name="twitter:description" content="UI interactions, design concepts and animations by Johny Vino.">

  <meta name="theme-color" content="#000000">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Johny Vino",
    "url": "https://interactions.johnyvino.com/",
    "sameAs": ["https://johnyvino.com", "https://www.instagram.com/johnyvinooo/"],
    "jobTitle": "UI Designer"
  }
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- Mobile hamburger -->
  <button class="mob-trigger" id="mobTrigger" aria-label="Open navigation" aria-expanded="false" aria-controls="sidebar">
    <svg width="18" height="13" viewBox="0 0 18 13" fill="none">
      <rect width="18" height="1.8" rx="0.9" fill="currentColor"/>
      <rect y="5.6" width="12" height="1.8" rx="0.9" fill="currentColor"/>
      <rect y="11.2" width="15" height="1.8" rx="0.9" fill="currentColor"/>
    </svg>
  </button>

  <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="https://johnyvino.com" class="sidebar-logo" target="_blank" rel="noopener noreferrer" aria-label="Johny Vino — home">
        <span class="logo-name">Johny Vino</span>
        <span class="logo-sub">Interaction Library</span>
      </a>
    </div>
    <nav class="sidebar-nav" id="sidebarNav" aria-label="Categories"></nav>
  </aside>

  <!-- Main -->
  <main class="main" id="main-content">
    <header class="page-header">
      <h1>Interaction Library</h1>
      <p class="page-sub">The concept, the design, the animation all done by<br>Johnyvino over 2 years</p>
    </header>
    <div id="sections"></div>
  </main>

  <script>
    const categories = [
      { id: 'featured',  emoji: '⭐', name: 'Featured',  count: 8 },
      { id: 'books',     emoji: '📚', name: 'Books',     count: 4 },
      { id: 'business',  emoji: '💼', name: 'Business',  count: 4 },
      { id: 'calendar',  emoji: '📅', name: 'Calendar',  count: 3 },
      { id: 'food',      emoji: '🍔', name: 'Food',      count: 4 },
      { id: 'health',    emoji: '🏥', name: 'Health',    count: 3 },
      { id: 'housing',   emoji: '🏠', name: 'Housing',   count: 3 },
      { id: 'map',       emoji: '🗺️', name: 'Map',       count: 3 },
      { id: 'messages',  emoji: '💬', name: 'Messages',  count: 4 },
      { id: 'music',     emoji: '🎵', name: 'Music',     count: 4 },
      { id: 'notes',     emoji: '📝', name: 'Notes',     count: 3 },
      { id: 'payment',   emoji: '💳', name: 'Payment',   count: 4 },
      { id: 'photos',    emoji: '📷', name: 'Photos',    count: 3 },
      { id: 'shopping',  emoji: '🛒', name: 'Shopping',  count: 4 },
      { id: 'others',    emoji: '🗂️', name: 'Others',    count: 3 },
    ];

    const gradients = [
      'linear-gradient(135deg, #0f2027, #2c5364)',
      'linear-gradient(135deg, #1a0a2e, #5a2090)',
      'linear-gradient(135deg, #0a2e1a, #0d6b3a)',
      'linear-gradient(135deg, #2e0a0a, #8a2222)',
      'linear-gradient(135deg, #0a1a2e, #1a4a8a)',
      'linear-gradient(135deg, #2e1a0a, #7a4a1a)',
      'linear-gradient(135deg, #0a2e2e, #1a7a6a)',
      'linear-gradient(135deg, #1e0a2e, #4a1a6a)',
    ];

    // Build sidebar
    const nav = document.getElementById('sidebarNav');
    categories.forEach((cat, i) => {
      const a = document.createElement('a');
      a.href = `#${cat.id}`;
      a.className = 'nav-item' + (i === 0 ? ' active' : '');
      a.dataset.section = cat.id;
      a.innerHTML = `<span class="nav-emoji">${cat.emoji}</span><span class="nav-label">${cat.name}</span>`;
      nav.appendChild(a);
    });

    // Build sections + cards
    const sectionsEl = document.getElementById('sections');
    let cardIndex = 0;
    categories.forEach(cat => {
      const section = document.createElement('section');
      section.id = cat.id;
      section.className = 'category-section';

      const h2 = document.createElement('h2');
      h2.className = 'section-title';
      h2.textContent = cat.name;
      section.appendChild(h2);

      const grid = document.createElement('div');
      grid.className = 'card-grid';

      for (let i = 0; i < cat.count; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        const grad = gradients[cardIndex % gradients.length];
        cardIndex++;
        card.innerHTML = `
          <div class="card-thumb" style="background:${grad}">
            <span class="card-label">${cat.name} ${String(i + 1).padStart(2, '0')}</span>
          </div>
        `;
        grid.appendChild(card);
      }

      section.appendChild(grid);
      sectionsEl.appendChild(section);
    });

    // Scroll spy
    const navItems = document.querySelectorAll('.nav-item');
    let lastActive = null;

    const spy = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          if (id !== lastActive) {
            lastActive = id;
            navItems.forEach(a => a.classList.toggle('active', a.dataset.section === id));
            history.replaceState(null, '', `#${id}`);
          }
        }
      });
    }, { rootMargin: '-10% 0px -80% 0px' });

    document.querySelectorAll('.category-section').forEach(s => spy.observe(s));

    // Nav click → smooth scroll
    navItems.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const target = document.getElementById(link.dataset.section);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.pushState(null, '', `#${link.dataset.section}`);
        }
        closeSidebar();
      });
    });

    // Mobile sidebar
    const mobTrigger = document.getElementById('mobTrigger');
    const overlay    = document.getElementById('sidebarOverlay');
    const sidebar    = document.getElementById('sidebar');

    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      mobTrigger.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      mobTrigger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    mobTrigger.addEventListener('click', () =>
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
    );
    overlay.addEventListener('click', closeSidebar);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && sidebar.classList.contains('open')) closeSidebar();
    });
  </script>

</body>
</html>
