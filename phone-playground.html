<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Mockup Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: var(--font-sans);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── VIEW TABS ── */
    #view-tabs {
      display: flex;
      gap: 2px;
      padding: 12px 20px 0;
      background: #0a0a0a;
      flex-shrink: 0;
      border-bottom: 1px solid #1a1a1a;
      align-self: flex-start;
      margin-left: calc(100vw - 300px - 20px);
    }

    /* align tabs above the panel */
    #main-row {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .tab-btn {
      padding: 6px 16px 10px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #444;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: #888; }
    .tab-btn.active { color: #fff; border-bottom-color: #fff; }

    /* ── PREVIEW AREA ── */
    #preview {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.3s;
    }

    /* Mobile view: narrow viewport sim */
    #preview.mobile-view {
      background: #111;
    }

    #preview.mobile-view .card-wrap {
      width: 160px;
    }

    .card-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 420px;
    }

    /* Mirrors main page card exactly */
    .card-thumb {
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      background: var(--card-bg, #D9E0EC);
      aspect-ratio: 4 / 3;
    }

    .phone-frame {
      position: absolute;
      inset: 16px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-screen {
      border-radius: var(--screen-radius, 44px);
      overflow: hidden;
      position: relative;
      aspect-ratio: 390 / 848;
      height: 100%;
      width: auto;
      max-width: 100%;
      box-shadow: var(--shadow-val, 0 32px 24px -8px rgba(0,0,0,0.28));
      -webkit-mask-image: var(--mask-val, none);
      mask-image: var(--mask-val, none);
    }

    /* Fringe cover overlay — sits above the video, z-index 10 */
    .phone-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 0 var(--fringe-cover, 2px) var(--card-bg, #D9E0EC);
      z-index: 10;
      pointer-events: none;
    }

    .phone-screen video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: var(--video-scale, scale(1));
      transform-origin: center center;
      position: relative;
      z-index: 2;
    }

    .card-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #666;
    }

    /* ── CONTROLS PANEL ── */
    #panel {
      width: 300px;
      flex-shrink: 0;
      background: #111;
      border-left: 1px solid #1e1e1e;
      overflow-y: auto;
      padding: 24px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    #panel::-webkit-scrollbar { width: 3px; }
    #panel::-webkit-scrollbar-thumb { background: #2a2a2a; }

    .panel-title {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #444;
      padding-bottom: 14px;
      border-bottom: 1px solid #1e1e1e;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ctrl-group-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3a3a3a;
    }

    .ctrl-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ctrl-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ctrl-label {
      font-size: 11px;
      color: #888;
      font-family: var(--font-mono);
    }

    .ctrl-value {
      font-size: 11px;
      color: #555;
      font-family: var(--font-mono);
      min-width: 40px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: #222;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }

    input[type="color"] {
      -webkit-appearance: none;
      width: 100%;
      height: 30px;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      cursor: pointer;
      background: none;
      padding: 2px;
    }

    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

    .divider { height: 1px; background: #1a1a1a; }

    .preset-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 5px 10px;
      border-radius: 100px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #666;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .preset-btn:hover { border-color: #555; color: #bbb; }
    .preset-btn.active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.06); }

    .copy-btn {
      width: 100%;
      padding: 11px;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #666;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .copy-btn:hover { border-color: #fff; color: #fff; }
    .copy-btn.copied { border-color: #5fa657; color: #5fa657; }

    .output-box {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: #444;
      line-height: 1.8;
      white-space: pre;
      overflow-x: auto;
    }
  </style>
</head>
<body>

<!-- ── VIEW TABS (floated above panel) ── -->
<div id="view-tabs">
  <button class="tab-btn active" data-view="desktop">Desktop</button>
  <button class="tab-btn" data-view="mobile">Mobile</button>
</div>

<div id="main-row">

<!-- ── PREVIEW ── -->
<div id="preview">
  <div class="card-wrap">
    <div class="card-thumb">
      <div class="phone-frame">
        <div class="phone-screen" id="phoneScreen">
          <video id="phoneVideo" src="Assets/demo-phone.mp4" autoplay loop muted playsinline></video>
        </div>
      </div>
    </div>
    <span class="card-label">Checklist</span>
  </div>
</div>

<!-- ── CONTROLS ── -->
<div id="panel">
  <div class="panel-title">Phone Mockup Playground</div>

  <!-- BACKGROUND COLOR -->
  <div class="ctrl-group">
    <div class="ctrl-group-label">Card Background</div>

    <div class="ctrl-row">
      <input type="color" id="cardBg" value="#D9E0EC">
    </div>

    <div class="ctrl-row">
      <div class="ctrl-label">Presets</div>
      <div class="preset-row">
        <button class="preset-btn active" data-bg="#D9E0EC">Blue-grey</button>
        <button class="preset-btn" data-bg="#F0EDE8">Warm</button>
        <button class="preset-btn" data-bg="#E8ECF0">Cool</button>
        <button class="preset-btn" data-bg="#F5E6D3">Peach</button>
        <button class="preset-btn" data-bg="#D3EAD3">Sage</button>
        <button class="preset-btn" data-bg="#1A1A1A">Dark</button>
        <button class="preset-btn" data-bg="#000000">Black</button>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- PHONE SCREEN -->
  <div class="ctrl-group">
    <div class="ctrl-group-label">Phone Screen</div>

    <div class="ctrl-row">
      <div class="ctrl-header">
        <span class="ctrl-label">Corner Radius</span>
        <span class="ctrl-value" id="screenRadiusVal">22px</span>
      </div>
      <input type="range" id="screenRadius" min="0" max="80" value="22">
    </div>
  </div>

  <div class="divider"></div>

  <!-- MASKING -->
  <div class="ctrl-group">
    <div class="ctrl-group-label">Masking</div>

    <div class="ctrl-row">
      <div class="ctrl-header">
        <span class="ctrl-label">Fringe Cover</span>
        <span class="ctrl-value" id="fringeCoverVal">2px</span>
      </div>
      <input type="range" id="fringeCover" min="0" max="16" value="2">
    </div>

    <div class="ctrl-row">
      <div class="ctrl-header">
        <span class="ctrl-label">Video Scale</span>
        <span class="ctrl-value" id="videoScaleVal">100%</span>
      </div>
      <input type="range" id="videoScale" min="100" max="115" step="0.5" value="100">
    </div>
    <!-- Zooms video so edges tuck behind the rounded mask -->

    <div class="ctrl-row">
      <div class="ctrl-header">
        <span class="ctrl-label">Edge Feather</span>
        <span class="ctrl-value" id="edgeFeatherVal">0px</span>
      </div>
      <input type="range" id="edgeFeather" min="0" max="24" value="0">
    </div>
    <!-- Softens the mask boundary using a gradient -->

    <div class="ctrl-row">
      <div class="ctrl-header">
        <span class="ctrl-label">Top Fade</span>
        <span class="ctrl-value" id="topFadeVal">0%</span>
      </div>
      <input type="range" id="topFade" min="0" max="25" value="0">
    </div>

    <div class="ctrl-row">
      <div class="ctrl-header">
        <span class="ctrl-label">Bottom Fade</span>
        <span class="ctrl-value" id="bottomFadeVal">0%</span>
      </div>
      <input type="range" id="bottomFade" min="0" max="25" value="0">
    </div>
  </div>

  <div class="divider"></div>

  <!-- SHADOW -->
  <div class="ctrl-group">
    <div class="ctrl-group-label">Shadow</div>

    <div class="ctrl-row">
      <div class="ctrl-header">
        <span class="ctrl-label">Y Offset</span>
        <span class="ctrl-value" id="shadowYVal">36px</span>
      </div>
      <input type="range" id="shadowY" min="0" max="80" value="36">
    </div>

    <div class="ctrl-row">
      <div class="ctrl-header">
        <span class="ctrl-label">Blur</span>
        <span class="ctrl-value" id="shadowBlurVal">35px</span>
      </div>
      <input type="range" id="shadowBlur" min="0" max="120" value="35">
    </div>

    <div class="ctrl-row">
      <div class="ctrl-header">
        <span class="ctrl-label">Spread</span>
        <span class="ctrl-value" id="shadowSpreadVal">-8px</span>
      </div>
      <input type="range" id="shadowSpread" min="-40" max="20" value="-8">
    </div>

    <div class="ctrl-row">
      <div class="ctrl-header">
        <span class="ctrl-label">Opacity</span>
        <span class="ctrl-value" id="shadowOpacityVal">23%</span>
      </div>
      <input type="range" id="shadowOpacity" min="0" max="100" value="23">
    </div>
  </div>

  <div class="divider"></div>

  <!-- OUTPUT -->
  <div class="ctrl-group">
    <div class="ctrl-group-label">CSS Output</div>
    <div class="output-box" id="outputBox">...</div>
    <button class="copy-btn" id="copyBtn">Copy CSS</button>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  const state = {
    cardBg:        '#D9E0EC',
    screenRadius:  22,
    fringeCover:   2,
    videoScale:    100,
    edgeFeather:   0,
    topFade:       0,
    bottomFade:    0,
    shadowY:       36,
    shadowBlur:    35,
    shadowSpread:  -8,
    shadowOpacity: 23,
  };

  function buildMask() {
    const r = state.screenRadius;
    const f = state.edgeFeather;
    const top = state.topFade;
    const bot = state.bottomFade;

    const hasFeather = f > 0;
    const hasFade    = top > 0 || bot > 0;

    if (!hasFeather && !hasFade) return 'none';

    const layers = [];

    // Edge feather: soften the clip boundary
    if (hasFeather) {
      layers.push(
        `radial-gradient(ellipse at 50% 50%, black calc(100% - ${f}px), transparent 100%)`
      );
    }

    // Top / bottom fade via linear gradient
    if (hasFade) {
      layers.push(
        `linear-gradient(to bottom, transparent ${top}%, black ${top > 0 ? top + 4 : 0}%, black ${100 - (bot > 0 ? bot + 4 : 0)}%, transparent ${100 - bot}%)`
      );
    }

    if (layers.length === 1) return layers[0];

    // When both layers are present, intersect them
    return layers.join(', ');
  }

  function apply() {
    const root = document.documentElement;
    const shadow = `0 ${state.shadowY}px ${state.shadowBlur}px ${state.shadowSpread}px rgba(0,0,0,${(state.shadowOpacity/100).toFixed(2)})`;
    const maskVal = buildMask();

    root.style.setProperty('--card-bg',       state.cardBg);
    root.style.setProperty('--screen-radius', state.screenRadius + 'px');
    root.style.setProperty('--fringe-cover',  state.fringeCover + 'px');
    root.style.setProperty('--shadow-val',    shadow);
    root.style.setProperty('--video-scale',   `scale(${(state.videoScale / 100).toFixed(3)})`);
    root.style.setProperty('--mask-val',      maskVal);

    const maskLine = maskVal === 'none' ? '' :
      `\n  -webkit-mask-image: ${maskVal};\n  mask-image: ${maskVal};`;

    const videoScaleLine = state.videoScale !== 100 ?
      `\n\n.card--phone .card-thumb video {\n  transform: scale(${(state.videoScale / 100).toFixed(3)});\n}` : '';

    const innerRadius = Math.max(0, state.screenRadius - state.fringeCover);
    $('outputBox').textContent =
`.card--phone .card-thumb {
  background: ${state.cardBg};
}

.phone-screen {
  border-radius: ${state.screenRadius}px;
  box-shadow: ${shadow};${maskLine}
}

.phone-screen::after {
  box-shadow: inset 0 0 0 ${state.fringeCover}px ${state.cardBg};
}${videoScaleLine}`;
  }

  function wireSlider(id, key, unit, valId) {
    $(id).addEventListener('input', e => {
      state[key] = parseFloat(e.target.value);
      $(valId).textContent = e.target.value + unit;
      apply();
    });
  }

  wireSlider('screenRadius',  'screenRadius',  'px', 'screenRadiusVal');
  wireSlider('fringeCover',   'fringeCover',   'px', 'fringeCoverVal');
  wireSlider('videoScale',    'videoScale',    '%',  'videoScaleVal');
  wireSlider('edgeFeather',   'edgeFeather',   'px', 'edgeFeatherVal');
  wireSlider('topFade',       'topFade',       '%',  'topFadeVal');
  wireSlider('bottomFade',    'bottomFade',    '%',  'bottomFadeVal');
  wireSlider('shadowY',       'shadowY',       'px', 'shadowYVal');
  wireSlider('shadowBlur',    'shadowBlur',    'px', 'shadowBlurVal');
  wireSlider('shadowSpread',  'shadowSpread',  'px', 'shadowSpreadVal');
  wireSlider('shadowOpacity', 'shadowOpacity', '%',  'shadowOpacityVal');

  $('cardBg').addEventListener('input', e => {
    state.cardBg = e.target.value;
    document.querySelectorAll('.preset-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.bg?.toLowerCase() === state.cardBg.toLowerCase())
    );
    apply();
  });

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.cardBg = btn.dataset.bg;
      $('cardBg').value = state.cardBg;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      apply();
    });
  });

  $('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText($('outputBox').textContent).then(() => {
      $('copyBtn').textContent = 'Copied!';
      $('copyBtn').classList.add('copied');
      setTimeout(() => {
        $('copyBtn').textContent = 'Copy CSS';
        $('copyBtn').classList.remove('copied');
      }, 2000);
    });
  });

  /* ── VIEW TABS ── */
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $('preview').classList.toggle('mobile-view', btn.dataset.view === 'mobile');
    });
  });

  apply();
</script>
</div><!-- #main-row -->
</body>
</html>
